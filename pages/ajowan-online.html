<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet">
<title>KOL 聯繫訊息工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F8F5EF;
    --surface: #FFFFFF;
    --surface2: #F2EEE6;
    --surface3: #FBFAF7;
    --border: #E5DED2;
    --border2: #CABCAB;
    --text: #1A1714;
    --text2: #61584E;
    --text3: #998F83;
    --accent: #7A674A;
    --accent-light: #EFE7DA;
    --accent-hover: #5A4934;
    --leaf: #55735C;
    --success: #3D7A5C;
    --success-bg: #EAF4EE;
    --shadow: 0 10px 28px rgba(64, 48, 30, 0.07);
    --radius: 12px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background:
      linear-gradient(180deg, #FFFCF7 0, var(--bg) 260px, #F4F0E8 100%);
    color: var(--text);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Layout ── */
  header {
    background: rgba(255, 255, 255, 0.88);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(14px);
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    min-width: 0;
  }

  .header-title {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .header-subtitle {
    font-size: 13px;
    color: var(--text3);
    white-space: nowrap;
  }

  .main {
    max-width: 820px;
    margin: 0 auto;
    padding: 2.25rem 1.5rem 4rem;
  }

  /* ── Intro ── */
  .tool-intro {
    margin-bottom: 1.6rem;
  }

  .tool-title {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 28px;
    font-weight: 500;
    line-height: 1.35;
    color: var(--text);
  }

  .tool-desc {
    max-width: 560px;
    margin-top: 8px;
    color: var(--text2);
    font-size: 14px;
  }

  .tool-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }

  .meta-pill {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.64);
    color: var(--text2);
    font-size: 13px;
  }

  #extra-meta-pills {
    display: contents;
  }

  .tool-resources {
    display: grid;
    gap: 10px;
    margin-top: 16px;
  }

  .resource-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
  }

  .resource-label {
    color: var(--text3);
    flex: 0 0 auto;
    min-width: 72px;
  }

  .keyword-list,
  .resource-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .keyword-chip {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--surface2);
    color: var(--text2);
    font-size: 13px;
  }

  .resource-note {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 30px;
    padding: 5px 12px;
    border: 1px solid rgba(229, 222, 210, 0.75);
    border-radius: 999px;
    background: #F7F1E8;
    color: var(--text2);
    font-size: 13px;
  }

  .resource-note-label {
    color: var(--text3);
    font-weight: 400;
  }

  .resource-note-value {
    color: var(--accent-hover);
    font-weight: 500;
  }

  .resource-note-extra {
    color: var(--text3);
  }

  .resource-link {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    padding: 5px 11px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.72);
    color: var(--accent-hover);
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
  }

  .resource-link:hover {
    background: var(--accent-light);
    border-color: var(--accent);
  }

  .message-list {
    display: block;
  }

  /* ── Section labels ── */
  .section-label {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--accent-hover);
    margin: 2.2rem 0 0.8rem;
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), rgba(229, 222, 210, 0));
  }

  .section-label:first-of-type { margin-top: 0; }

  /* ── Message Card ── */
  .msg-card {
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.7);
  }

  .msg-card:hover {
    border-color: var(--border2);
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }

  .msg-header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 14px;
    padding: 16px 18px 14px;
  }

  .msg-meta { min-width: 0; }

  .msg-title-row {
    display: flex;
    align-items: center;
    gap: 9px;
    min-width: 0;
  }

  .msg-code {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 42px;
    height: 26px;
    padding: 0 10px;
    border: 1px solid #D8C8B2;
    border-radius: 999px;
    background: #F3ECE0;
    color: var(--accent-hover);
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: 0.03em;
    flex: 0 0 auto;
  }

  .msg-title {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.45;
    min-width: 0;
  }

  .msg-subtitle {
    font-size: 14px;
    color: var(--text3);
    margin-top: 3px;
  }

  .msg-resource-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface3);
    color: var(--text2);
    font-size: 14px;
    width: fit-content;
    max-width: 100%;
  }

  .msg-resource-label {
    color: var(--text3);
    flex: 0 0 auto;
  }

  .msg-resource-links {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .msg-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border: 1px solid rgba(202, 188, 171, 0.8);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.72);
    color: var(--accent-hover);
    font-weight: 500;
    text-decoration: none;
  }

  .msg-link:hover {
    text-decoration: underline;
  }

  .msg-link::after {
    content: '↗';
    margin-left: 4px;
    font-size: 12px;
  }

  .msg-link-note {
    color: var(--text3);
    font-weight: 400;
  }

  .msg-note-list {
    margin-top: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: #FFF9EF;
    color: var(--text2);
    font-size: 14px;
    line-height: 1.65;
    width: fit-content;
    max-width: 100%;
  }

  .msg-note-label {
    color: var(--text3);
    font-weight: 500;
    margin-bottom: 3px;
  }

  .msg-note-list ul {
    list-style: none;
  }

  .note-link {
    display: inline-flex;
    align-items: center;
    min-height: 26px;
    margin-left: 5px;
    padding: 2px 9px;
    border: 1px solid rgba(202, 188, 171, 0.85);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.74);
    color: var(--accent-hover);
    font-weight: 500;
    text-decoration: none;
  }

  .note-link:hover {
    background: var(--accent-light);
    color: var(--accent);
  }

  .note-link::after {
    content: '↗';
    margin-left: 5px;
    font-size: 12px;
  }

  /* ── Expand / Content area ── */
  .msg-toggle {
    width: 100%;
    background: var(--surface3);
    border: none;
    border-top: 1px solid var(--border);
    padding: 9px 18px;
    text-align: left;
    font-size: 14px;
    color: var(--text2);
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.12s, color 0.12s;
  }

  .msg-toggle:hover {
    background: var(--accent-light);
    color: var(--accent-hover);
  }

  .msg-body {
    display: none;
    padding: 14px 18px 16px;
    flex-direction: column;
    gap: 12px;
    border-top: 1px solid rgba(229, 222, 210, 0.65);
  }

  .msg-body.open { display: flex; }

  /* ── Editable textarea ── */
  .msg-textarea {
    width: 100%;
    min-height: 180px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    line-height: 1.75;
    color: var(--text);
    background: #FFFCF8;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }

  .msg-textarea:focus {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(122, 103, 74, 0.12);
  }

  /* ── Copy buttons ── */
  .btn-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-height: 36px;
    padding: 7px 14px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    background: var(--surface);
    color: var(--text2);
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
    white-space: nowrap;
  }

  .copy-btn:hover {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent-hover);
    transform: translateY(-1px);
  }

  .copy-btn.copied {
    background: var(--success-bg);
    border-color: var(--success);
    color: var(--success);
  }

  /* icon via unicode arrow/check */
  .icon-copy::before { content: '⧉'; margin-right: 2px; font-size: 13px; }
  .icon-check::before { content: '✓'; margin-right: 2px; }

  /* ── Header copy-group (before expand) ── */
  .header-btns {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .header-btns .copy-btn {
    font-size: 13px;
    min-height: 34px;
    padding: 6px 12px;
  }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    .msg-header {
      grid-template-columns: 1fr;
      align-items: stretch;
      gap: 12px;
    }

    .header-btns,
    .header-btns .copy-btn {
      width: 100%;
    }
  }

  @media (max-width: 600px) {
    body { font-size: 15px; }
    header { padding: 0.65rem 1rem; }
    .brand {
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }
    .header-subtitle { display: none; }
    .main { padding: 1.4rem 1rem 3rem; }
    .tool-title { font-size: 25px; }
    .tool-desc { font-size: 14px; }
    .resource-row {
      flex-direction: column;
      gap: 5px;
    }
    .resource-label { min-width: 0; }
    .msg-resource-row {
      align-items: flex-start;
      flex-direction: column;
      gap: 5px;
      width: 100%;
    }
    .section-label { margin-top: 1.8rem; }
    .msg-header { padding: 14px; }
    .msg-title-row {
      align-items: flex-start;
      flex-direction: column;
      gap: 7px;
    }
    .msg-toggle { padding: 10px 14px; }
    .msg-body { padding: 12px 14px 14px; }
    .msg-textarea {
      min-height: 220px;
      font-size: 14px;
    }
    .btn-group .copy-btn { flex: 1 1 150px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="header-title" id="header-title"></span>
    <span class="header-subtitle">一鍵複製工具</span>
  </div>
</header>

<main class="main">

  <div class="tool-intro">
    <h1 class="tool-title" id="tool-title"></h1>
    <p class="tool-desc" id="tool-desc"></p>
    <div class="tool-meta" aria-label="工具摘要">
      <span class="meta-pill" id="brand-pill"></span>
      <span class="meta-pill" id="language-pill"></span>
      <span id="extra-meta-pills"></span>
      <span class="meta-pill" id="count-pill"></span>
      <span class="meta-pill">可編輯後複製</span>
    </div>
    <div class="tool-resources" id="tool-resources"></div>
  </div>

  <div id="message-list" class="message-list"></div>

</main>

<script>
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="icon-check"></span>已複製';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2200);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="icon-check"></span>已複製';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2200);
  });
}

function copyFromTextarea(textareaId, btn) {
  const ta = document.getElementById(textareaId);
  copyText(ta.value, btn);
}

let cardCounter = 0;

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function renderLink(link, className) {
  const note = link.note ? `<span class="msg-link-note">${escapeHtml(link.note)}</span>` : '';
  return `<a class="${className}" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.label)}${note}</a>`;
}

function renderItemLinks(item) {
  if (!item.links || item.links.length === 0) return '';
  return `
        <div class="msg-resource-row">
          <span class="msg-resource-label">工作資源</span>
          <span class="msg-resource-links">${item.links.map((link) => renderLink(link, 'msg-link')).join('')}</span>
        </div>`;
}

function renderItemNotes(item) {
  if (!item.notes || item.notes.length === 0) return '';
  const label = item.noteLabel || '下一步提醒';
  const renderNote = (note) => {
    if (typeof note === 'string') return escapeHtml(note);
    const text = escapeHtml(note.text || note.label || '');
    if (!note.url) return text;
    const linkLabel = escapeHtml(note.linkLabel || note.urlLabel || text);
    return `${text}<a class="note-link" href="${escapeHtml(note.url)}" target="_blank" rel="noopener noreferrer">${linkLabel}</a>`;
  };
  return `
        <div class="msg-note-list">
          <div class="msg-note-label">${escapeHtml(label)}</div>
          <ul>${item.notes.map((note) => `<li>${renderNote(note)}</li>`).join('')}</ul>
        </div>`;
}

function buildTwCard(item) {
  const id = 'card-' + (++cardCounter);
  const taId = 'ta-' + id;
  const escaped = item.content.replace(/`/g, '\\`');
  const links = renderItemLinks(item);
  const notes = renderItemNotes(item);

  return `
  <div class="msg-card">
    <div class="msg-header">
      <div class="msg-meta">
        <div class="msg-title-row">
          <span class="msg-code">${item.code}</span>
          <div class="msg-title">${item.title}</div>
        </div>
        <div class="msg-subtitle">${item.subtitle}</div>
        ${links}
        ${notes}
      </div>
      <div class="header-btns">
        <button class="copy-btn" onclick="copyText(\`${escaped}\`, this)">
          <span class="icon-copy"></span>快速複製
        </button>
      </div>
    </div>
    <button class="msg-toggle" onclick="toggleBody('${id}')">
      <span id="toggle-icon-${id}">▸</span>
      <span id="toggle-label-${id}">展開編輯</span>
    </button>
    <div class="msg-body" id="${id}">
      <textarea class="msg-textarea" id="${taId}">${item.content}</textarea>
      <div class="btn-group">
        <button class="copy-btn" onclick="copyFromTextarea('${taId}', this)">
          <span class="icon-copy"></span>複製（含修改）
        </button>
        <button class="copy-btn" onclick="resetTextarea('${taId}', \`${escaped}\`, this)">
          ↺ 還原原文
        </button>
      </div>
    </div>
  </div>`;
}

function toggleBody(id) {
  const body = document.getElementById(id);
  const icon = document.getElementById('toggle-icon-' + id);
  const label = document.getElementById('toggle-label-' + id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  icon.textContent = isOpen ? '▸' : '▾';
  label.textContent = isOpen ? '展開編輯' : '收起';
}

function resetTextarea(taId, original, btn) {
  document.getElementById(taId).value = original;
  const orig = btn.innerHTML;
  btn.innerHTML = '✓ 已還原';
  setTimeout(() => { btn.innerHTML = orig; }, 1500);
}

function renderMessages(messages, targetId) {
  const panel = document.getElementById(targetId);
  let html = '';
  messages.forEach(section => {
    html += `<div class="section-label">${section.section}</div>`;
    section.items.forEach(item => { html += buildTwCard(item); });
  });
  panel.innerHTML = html;
}

function totalMessages(messages) {
  return messages.reduce((total, section) => total + section.items.length, 0);
}

function renderToolResources(config) {
  const panel = document.getElementById('tool-resources');
  const rows = [];

  if (config.searchKeywords && config.searchKeywords.length > 0) {
    rows.push(`
      <div class="resource-row">
        <div class="resource-label">搜尋關鍵字</div>
        <div class="keyword-list">
          ${config.searchKeywords.map((keyword) => `<span class="keyword-chip">${escapeHtml(keyword)}</span>`).join('')}
        </div>
      </div>`);
  }

  if (config.resources && config.resources.length > 0) {
    const resourceNotes = config.resourceNotes && config.resourceNotes.length > 0
      ? config.resourceNotes.map((note) => {
        if (typeof note === 'string') return `<span class="resource-note">${escapeHtml(note)}</span>`;
        const extra = note.note ? `<span class="resource-note-extra">（${escapeHtml(note.note)}）</span>` : '';
        return `<span class="resource-note"><span class="resource-note-label">${escapeHtml(note.label)}</span><span class="resource-note-value">${escapeHtml(note.value)}</span>${extra}</span>`;
      }).join('')
      : '';
    rows.push(`
      <div class="resource-row">
        <div class="resource-label">企劃書連結</div>
        <div class="resource-links">
          ${config.resources.map((link) => renderLink(link, 'resource-link')).join('')}
          ${resourceNotes}
        </div>
      </div>`);
  }

  if (config.resourceGroups && config.resourceGroups.length > 0) {
    config.resourceGroups.forEach((group) => {
      if (!group.links || group.links.length === 0) return;
      rows.push(`
      <div class="resource-row">
        <div class="resource-label">${escapeHtml(group.label)}</div>
        <div class="resource-links">
          ${group.links.map((link) => renderLink(link, 'resource-link')).join('')}
        </div>
      </div>`);
    });
  }

  panel.innerHTML = rows.join('');
}

const CLIENT_CONFIG = {
  "slug": "ajowan-online",
  "brandName": "印茴官網",
  "languageLabel": "繁體中文版",
  "headerTitle": "KOL 合作",
  "toolTitle": "KOL 聯繫訊息工具",
  "toolDescription": "整理 KOL 合作流程常用訊息，快速複製，也能先展開微調內容再送出。",
  "metaPills": [
    "Facebook 為主",
    "分潤合作"
  ],
  "searchKeywords": [
    "精油",
    "芳療",
    "瑜珈",
    "身心靈",
    "靈性療癒",
    "冥想",
    "水晶",
