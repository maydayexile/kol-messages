<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;

    color: #1A1714;
    font-family: 'Noto Sans TC', sans-serif;
    line-height: 1.6;
  }
  header {
    min-height: 60px;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #E5DED2;
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(14px);
  }
  .header-title {
    font-size: 16px;
    font-weight: 500;
  }
  main {
    width: min(760px, calc(100% - 2rem));
    margin: 0 auto;
    padding: 2.5rem 0 4rem;
  }
  h1 {
    font-size: 28px;
    font-weight: 600;
    line-height: 1.35;
  }
  .desc {
    margin-top: 8px;
    color: #61584E;
    font-size: 14px;
  }
  .section {
    margin-top: 2rem;
  }
  .section-title {
    color: #5A4934;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
  }
  .client-list,
  .template-list {
    display: grid;
    gap: 12px;
    margin-top: 0.8rem;
  }
  .client-card,
  .template-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 18px 20px;
    border: 1px solid #E5DED2;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.92);
    color: inherit;
    text-decoration: none;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  }
  .client-card:hover,
  .template-card:hover {
    border-color: #CABCAB;
    box-shadow: 0 10px 28px rgba(64, 48, 30, 0.07);
    transform: translateY(-1px);
  }
  .client-name,
  .template-name {
    font-size: 17px;
    font-weight: 600;
  }
  .client-meta,
  .template-meta {
    color: #998F83;
    font-size: 13px;
    white-space: nowrap;
  }
  .note {
    margin-top: 18px;
    color: #998F83;
    font-size: 12px;
  }
  @media (max-width: 600px) {
    header { padding: 0.65rem 1rem; }
    main { padding-top: 1.5rem; }
    h1 { font-size: 24px; }
    .client-card,
    .template-card {
      align-items: flex-start;
      flex-direction: column;
      gap: 4px;
      padding: 16px;

    .client-meta,
